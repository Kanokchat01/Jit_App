name: flutter_app_jiddee
description: Mental Health Assessment App (JidDee)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # ✅ AI / Camera
  camera: ^0.10.6
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_commons: ^0.9.0
  permission_handler: ^11.3.1
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  path_provider: ^2.1.3

  # ✅ Firebase + อื่น ๆ (ของเดิม)
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.4
  url_launcher: ^6.3.2
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/jitdee_mascot.png
    - assets/models/


flutter_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png